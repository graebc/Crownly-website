<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queenzy – Master of Logic</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#0F172A">
    <meta name="description" content="Queenzy – Master of Logic. Ein Puzzle-Spiel für iOS.">
    <meta property="og:title" content="Queenzy – Master of Logic">
    <meta property="og:description" content="Logik-Puzzle für iOS. Platziere Figuren auf einem farbigen Spielfeld.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #0F172A; color: #F1F5F9; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 480px; width: 100%; padding: 60px 24px 40px; }

        /* Header: Logo + Title inline (matches app MenuView) */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo {
            width: 52px; height: 52px; background: #1E293B; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            border: 1px solid rgba(241,245,249,0.08);
        }
        .logo svg { width: 32px; height: 32px; }
        .header-text { display: flex; flex-direction: column; gap: 0; }
        h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.1; }
        .subtitle { color: #64748B; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; line-height: 1.2; }

        /* Language toggle */
        .lang-toggle { display: inline-flex; gap: 8px; margin-bottom: 32px; }
        .lang-toggle a {
            padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 700;
            text-decoration: none; color: #64748B; background: #1E293B;
            border: 1px solid rgba(241,245,249,0.06); cursor: pointer;
        }
        .lang-toggle a.active { background: #F1F5F9; color: #0F172A; }

        /* Cards */
        .links { display: flex; flex-direction: column; gap: 10px; }
        .links a {
            display: flex; align-items: center; gap: 14px;
            padding: 18px 20px; background: #1E293B; border-radius: 16px;
            text-decoration: none; color: #F1F5F9; font-weight: 700; font-size: 15px;
            border: 1px solid rgba(241,245,249,0.06);
            transition: background 0.15s, transform 0.15s;
        }
        .links a:hover { background: #334155; transform: translateY(-1px); }
        .links a:active { transform: scale(0.98); }
        .icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .icon-privacy { background: rgba(16,185,129,0.15); }
        .icon-terms { background: rgba(59,130,246,0.15); }
        .icon-imprint { background: rgba(251,191,36,0.15); }
        .arrow { margin-left: auto; color: #475569; font-size: 18px; }
        footer { margin-top: 60px; text-align: center; color: #475569; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 28L6 16L13.5 21.5L24 8L34.5 21.5L42 16L42 28Z" fill="#FBBF24"/>
                    <rect x="4" y="29.5" width="40" height="4.5" rx="1.5" fill="#FBBF24"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>Queenzy</h1>
                <span class="subtitle">Master of Logic</span>
            </div>
        </div>

        <div class="lang-toggle">
            <a id="btn-de" class="active" onclick="switchLang('de')">Deutsch</a>
            <a id="btn-en" onclick="switchLang('en')">English</a>
        </div>

        <div class="links" id="links-de">
            <a href="privacy.html">
                <span class="icon icon-privacy">🔒</span>
                Datenschutzerklärung
                <span class="arrow">›</span>
            </a>
            <a href="terms.html">
                <span class="icon icon-terms">📄</span>
                Nutzungsbedingungen
                <span class="arrow">›</span>
            </a>
            <a href="imprint.html">
                <span class="icon icon-imprint">ℹ️</span>
                Impressum
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="links" id="links-en" style="display:none;">
            <a href="privacy.html#en">
                <span class="icon icon-privacy">🔒</span>
                Privacy Policy
                <span class="arrow">›</span>
            </a>
            <a href="terms.html#en">
                <span class="icon icon-terms">📄</span>
                Terms of Service
                <span class="arrow">›</span>
            </a>
            <a href="imprint.html">
                <span class="icon icon-imprint">ℹ️</span>
                Imprint
                <span class="arrow">›</span>
            </a>
        </div>

        <footer>
            <p>© 2026 Queenzy. Alle Rechte vorbehalten.</p>
        </footer>
    </div>

    <script>
        function switchLang(lang) {
            document.getElementById('links-de').style.display = lang === 'de' ? 'flex' : 'none';
            document.getElementById('links-en').style.display = lang === 'en' ? 'flex' : 'none';
            document.getElementById('btn-de').classList.toggle('active', lang === 'de');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        }
    </script>
</body>
</html>
